# package:test configuration
# https://github.com/dart-lang/test/blob/master/pkgs/test/doc/configuration.md

timeout: 1m
concurrency: 8
platforms: [vm, node, chrome]
allow_duplicate_test_names: false

tags:
  vm-only:
    skip: true
    on_platform:
      vm:
        skip: false
  node-only:
    skip: true
    on_platform:
      node:
        skip: false

presets:
  # Runs the web-safe suite through the dart2wasm compiler on Chrome. Chrome is
  # not in the default `platforms` (it needs a browser), so invoke this platform
  # explicitly with `dart test -P wasm`. CI's release matrix uses it too.
  wasm:
    platforms: [chrome]
    compilers: [dart2wasm]
